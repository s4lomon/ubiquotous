<style>
    /* Navigation Bar Styles */
    .navbar {

        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        padding: 20px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .navbar-content {

    }

    /* Make Learn non-clickable */
    .navbar-menu li a.no-click {
        cursor: default;
        pointer-events: none;
    }

    /* Dropdown Menu */
    .dropdown-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 50%;

        margin-top: 0px;
        padding-top: 20px;
        width: 600px;
        z-index: 1000;
    }

    .dropdown-menu-content {

    }

    .dropdown-columns {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 30px;
    }

    .dropdown-column {
        position: relative;
        padding-right: 30px;
    }

    .dropdown-column:not(:last-child)::after {
        content: '';
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 1px;
        background: rgba(128, 128, 128, 0.3);
    }

    .dropdown-column h4 {
        font-size: 12px;
        font-weight: 600;
        color: #888;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .dropdown-column ul {
        list-style: none;
    }

    .dropdown-column ul li {
        margin-bottom: 8px;
    }

    .dropdown-column ul li a {
        font-size: 14px;
        color: #888;
        text-decoration: none;
        transition: opacity 0.2s ease;
        display: block;
        padding: 4px 0;
        pointer-events: auto;

    .navbar-cta {

    }

        .navbar-content {

        }

            justify-content: center;

        }

            width: 90vw;
        }

            grid-template-columns: 1fr;
            gap: 20px;
        }
    }
