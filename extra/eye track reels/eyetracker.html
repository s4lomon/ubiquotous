<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eye-Gaze Video Recorder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #000;
            height: 100vh;
            width: 100vw;
        }

        #video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .button-overlay {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .button-overlay:active {
            transform: scale(0.95);
        }

        #start-btn {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 100px;
            height: 100px;
            font-size: 14px;
        }

        #pause-btn {
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        #continue-btn {
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        #end-btn {
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        #restart-btn {
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
        }

        .progress-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
        }

        .progress-ring circle {
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-dasharray: 251.2;
            stroke-dashoffset: 251.2;
            transform-origin: center;
            transform: rotate(-90deg);
            transition: stroke-dashoffset 0.3s linear;
        }

        .hidden {
            display: none !important;
        }

        #recording-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .rec-dot {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            width: 350px;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content p {
            margin-bottom: 25px;
            color: #666;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .modal-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .modal-btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
            color: white;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        #timer {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        #gaze-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="camera-feed" autoplay playsinline muted></video>
        <canvas id="face-canvas" style="display:none;"></canvas>
        
        <div id="gaze-indicator"></div>
        <div id="recording-indicator">
            <div class="rec-dot"></div>
            <span>RECORDING</span>
        </div>
        <div id="timer">00:00</div>

        <!-- Start Button (Initial State) -->
        <div id="start-btn" class="button-overlay">
            <svg class="progress-ring" viewBox="0 0 90 90">
                <circle cx="45" cy="45" r="40"/>
            </svg>
            START
        </div>

        <!-- Recording Control Buttons (Hidden Initially) -->
        <div id="pause-btn" class="button-overlay hidden">
            <svg class="progress-ring" viewBox="0 0 90 90">
                <circle cx="45" cy="45" r="40"/>
            </svg>
            PAUSE
        </div>

        <div id="continue-btn" class="button-overlay hidden">
            <svg class="progress-ring" viewBox="0 0 90 90">
                <circle cx="45" cy="45" r="40"/>
            </svg>
            CONTINUE
        </div>

        <div id="end-btn" class="button-overlay hidden">
            <svg class="progress-ring" viewBox="0 0 90 90">
                <circle cx="45" cy="45" r="40"/>
            </svg>
            END
        </div>

        <div id="restart-btn" class="button-overlay hidden">
            <svg class="progress-ring" viewBox="0 0 90 90">
                <circle cx="45" cy="45" r="40"/>
            </svg>
            RESTART
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay">
        <div class="modal-content" id="modal-content">
            <!-- Content will be dynamically inserted -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

    <script>
        // Global state
        let mediaRecorder;
        let recordedChunks = [];
        let stream;
        let isRecording = false;
        let isPaused = false;
        let startTime;
        let timerInterval;
        let faceMesh;
        let camera;
        let gazeX = 0;
        let gazeY = 0;

        const DWELL_TIME = 300; // 0.3 seconds
        const buttons = {
            start: { element: document.getElementById('start-btn'), dwellStart: null },
            pause: { element: document.getElementById('pause-btn'), dwellStart: null },
            continue: { element: document.getElementById('continue-btn'), dwellStart: null },
            end: { element: document.getElementById('end-btn'), dwellStart: null },
            restart: { element: document.getElementById('restart-btn'), dwellStart: null }
        };

        // Initialize camera
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }, 
                    audio: true 
                });
                document.getElementById('camera-feed').srcObject = stream;
                
                // Initialize MediaPipe Face Mesh
                initFaceMesh();
            } catch (err) {
                alert('Camera access denied. Please allow camera permissions.');
                console.error(err);
            }
        }

        // Initialize MediaPipe Face Mesh for eye tracking
        function initFaceMesh() {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults(onFaceMeshResults);

            const videoElement = document.getElementById('camera-feed');
            camera = new Camera(videoElement, {
                onFrame: async () => {
                    await faceMesh.send({ image: videoElement });
                },
                width: 1280,
                height: 720
            });
            camera.start();
        }

        // Process face mesh results for eye tracking
        function onFaceMeshResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                
                // Use iris landmarks for gaze estimation
                // Left iris center: 468, Right iris center: 473
                const leftIris = landmarks[468];
                const rightIris = landmarks[473];
                
                // Average the iris positions for gaze point
                gazeX = ((leftIris.x + rightIris.x) / 2) * window.innerWidth;
                gazeY = ((leftIris.y + rightIris.y) / 2) * window.innerHeight;

                // Update gaze indicator
                const gazeIndicator = document.getElementById('gaze-indicator');
                gazeIndicator.style.display = 'block';
                gazeIndicator.style.left = gazeX + 'px';
                gazeIndicator.style.top = gazeY + 'px';

                // Check which button is being gazed at
                checkGazeOnButtons();
            }
        }

        // Check if gaze is on any button
        function checkGazeOnButtons() {
            Object.entries(buttons).forEach(([key, button]) => {
                if (button.element.classList.contains('hidden')) {
                    button.dwellStart = null;
                    return;
                }

                const rect = button.element.getBoundingClientRect();
                const isGazingAt = gazeX >= rect.left && gazeX <= rect.right &&
                                   gazeY >= rect.top && gazeY <= rect.bottom;

                if (isGazingAt) {
                    if (!button.dwellStart) {
                        button.dwellStart = Date.now();
                    }

                    const elapsed = Date.now() - button.dwellStart;
                    const progress = Math.min(elapsed / DWELL_TIME, 1);
                    
                    // Update progress ring
                    const circle = button.element.querySelector('circle');
                    const offset = 251.2 * (1 - progress);
                    circle.style.strokeDashoffset = offset;

                    if (progress >= 1) {
                        handleButtonActivation(key);
                        button.dwellStart = null;
                    }
                } else {
                    button.dwellStart = null;
                    const circle = button.element.querySelector('circle');
                    circle.style.strokeDashoffset = 251.2;
                }
            });
        }

        // Handle button activation
        function handleButtonActivation(buttonKey) {
            switch(buttonKey) {
                case 'start':
                    startRecording();
                    break;
                case 'pause':
                    pauseRecording();
                    break;
                case 'continue':
                    continueRecording();
                    break;
                case 'end':
                    showEndModal();
                    break;
                case 'restart':
                    showRestartConfirmation();
                    break;
            }
        }

        // Start recording
        function startRecording() {
            recordedChunks = [];
            
            mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 2500000
            });

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            mediaRecorder.start();
            isRecording = true;
            isPaused = false;
            startTime = Date.now();

            // Update UI
            buttons.start.element.classList.add('hidden');
            buttons.pause.element.classList.remove('hidden');
            buttons.end.element.classList.remove('hidden');
            buttons.restart.element.classList.remove('hidden');
            document.getElementById('recording-indicator').style.display = 'flex';
            document.getElementById('timer').style.display = 'block';

            startTimer();
        }

        // Pause recording
        function pauseRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.pause();
                isPaused = true;
                buttons.pause.element.classList.add('hidden');
                buttons.continue.element.classList.remove('hidden');
                document.getElementById('recording-indicator').style.display = 'none';
                stopTimer();
            }
        }

        // Continue recording
        function continueRecording() {
            if (mediaRecorder && mediaRecorder.state === 'paused') {
                mediaRecorder.resume();
                isPaused = false;
                buttons.continue.element.classList.add('hidden');
                buttons.pause.element.classList.remove('hidden');
                document.getElementById('recording-indicator').style.display = 'flex';
                startTimer();
            }
        }

        // Timer functions
        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const minutes = Math.floor(elapsed / 60000);
                const seconds = Math.floor((elapsed % 60000) / 1000);
                document.getElementById('timer').textContent = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        // Show end modal
        function showEndModal() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    showSaveOptions(blob);
                };
            }
            stopTimer();
        }

        // Show save options modal
        function showSaveOptions(blob) {
            const modal = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <h2>Recording Complete!</h2>
                <p>Choose how you'd like to save your video:</p>
                <div class="modal-buttons">
                    <button class="modal-btn btn-success" onclick="saveToGallery()">Save to Gallery</button>
                    <button class="modal-btn btn-primary" onclick="shareToInstagram()">Share to Instagram</button>
                    <button class="modal-btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            `;
            
            modal.style.display = 'flex';
            window.currentVideoBlob = blob;
        }

        // Save to gallery
        function saveToGallery() {
            const blob = window.currentVideoBlob;
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `eye-gaze-recording-${Date.now()}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            closeModal();
            resetRecording();
        }

        // Share to Instagram (opens share sheet on mobile)
        function shareToInstagram() {
            const blob = window.currentVideoBlob;
            const file = new File([blob], `recording-${Date.now()}.webm`, { type: 'video/webm' });
            
            if (navigator.share && navigator.canShare({ files: [file] })) {
                navigator.share({
                    files: [file],
                    title: 'My Eye-Gaze Recording',
                    text: 'Check out my hands-free recording!'
                }).then(() => {
                    closeModal();
                    resetRecording();
                }).catch(err => {
                    console.error('Share failed:', err);
                    alert('Sharing failed. Try saving to gallery instead.');
                });
            } else {
                alert('Sharing not supported on this device. Please save to gallery and share manually.');
            }
        }

        // Show restart confirmation
        function showRestartConfirmation() {
            const modal = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <h2>Restart Recording?</h2>
                <p>This will delete your current recording. Are you sure?</p>
                <div class="modal-buttons">
                    <button class="modal-btn btn-danger" onclick="confirmRestart()">Yes, Restart</button>
                    <button class="modal-btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            `;
            
            modal.style.display = 'flex';
        }

        // Confirm restart
        function confirmRestart() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            stopTimer();
            closeModal();
            resetRecording();
            startRecording();
        }

        // Reset recording state
        function resetRecording() {
            recordedChunks = [];
            isRecording = false;
            isPaused = false;
            
            buttons.start.element.classList.remove('hidden');
            buttons.pause.element.classList.add('hidden');
            buttons.continue.element.classList.add('hidden');
            buttons.end.element.classList.add('hidden');
            buttons.restart.element.classList.add('hidden');
            
            document.getElementById('recording-indicator').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            document.getElementById('timer').textContent = '00:00';
        }

        // Close modal
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initCamera();
        });

        // Handle touch events for mobile (fallback)
        Object.entries(buttons).forEach(([key, button]) => {
            let touchStart = null;
            
            button.element.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchStart = Date.now();
                updateTouchProgress(button, 0);
            });

            button.element.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (touchStart) {
                    const elapsed = Date.now() - touchStart;
                    if (elapsed >= DWELL_TIME) {
                        handleButtonActivation(key);
                    }
                    touchStart = null;
                    const circle = button.element.querySelector('circle');
                    circle.style.strokeDashoffset = 251.2;
                }
            });
        });

        function updateTouchProgress(button, progress) {
            const circle = button.element.querySelector('circle');
            const offset = 251.2 * (1 - progress);
            circle.style.strokeDashoffset = offset;
        }
    </script>
</body>
</html>
